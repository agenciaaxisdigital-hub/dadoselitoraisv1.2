    <!-- Preload Google Fonts: non-blocking -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Montserrat:wght@800;900&display=swap" onload="this.onload=null;this.rel='stylesheet'" />

    <meta property="og:title" content="AXISPOLITIC — Sistema Eleitoral Goiano" />

    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />

    <style>
      #splash-screen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #fff;
        transition: opacity 0.4s ease-out;
      }
      #splash-screen.hide { opacity: 0; pointer-events: none; }
      #splash-logo {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        font-size: 1.6rem;
        font-weight: 800;
        color: #1e3a5f;
        margin-bottom: 1.5rem;
        letter-spacing: -0.01em;
      }
      #splash-logo span { color: #2b76c0; }
      .splash-bar {
        width: 200px;
        height: 3px;
        background: #dde8f5;
        border-radius: 4px;
        overflow: hidden;
        position: relative;
      }
      .splash-bar::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, #1e3a5f, #2b76c0);
        border-radius: 4px;
        animation: splash-progress 1.8s ease-in-out infinite;
        transform-origin: left;
      }
      @keyframes splash-progress {
        0% { transform: scaleX(0) translateX(0); }
        50% { transform: scaleX(0.6) translateX(30%); }
        100% { transform: scaleX(0) translateX(100%); }
      }
      .splash-subtitle {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 0.6rem;
        font-weight: 600;
        color: #4a6a8a;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        margin-top: -1rem;
        margin-bottom: 1.5rem;
      }
      .splash-text {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 0.75rem;
        color: #6b8aaa;
        margin-top: 1rem;
      }
    </style>
  </head>

  <body>
    <div id="splash-screen">
      <img src="/logo-axis.jpg" alt="Axis" style="width:64px;height:64px;object-fit:contain;margin-bottom:12px;opacity:0.85;" />
      <div id="splash-logo">AXIS<span>POLITIC</span></div>
      <div class="splash-subtitle">Sistema Eleitoral Goiano</div>
      <div class="splash-bar"></div>
      <div class="splash-text">Carregando dados eleitorais…</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
